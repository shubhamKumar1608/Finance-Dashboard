databases:
  - name: finance-db
    databaseName: financedb
    user: financeuser
    plan: free

services:
  - type: web
    name: finance-dashboard
    env: node
    plan: free
    buildCommand: "npm install && npm run db:push && npm run build"
    startCommand: "npm start"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finance-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
